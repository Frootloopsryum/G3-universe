<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service deposit received | G3 Universe</title>
  <meta name="description" content="Your G3 service deposit has been received." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="cosmic-bg" aria-hidden="true">
    <span class="orb orb-one"></span>
    <span class="orb orb-two"></span>
    <span class="orb orb-three"></span>
    <div class="star-layer star-layer-one"></div>
    <div class="star-layer star-layer-two"></div>
    <div class="star-layer star-layer-three"></div>
  </div>

  <main class="success-page">
    <div class="container" id="serviceSuccessShell">
      <div class="success-detail-card reveal visible">
        <p class="kicker">Deposit received</p>
        <h1>Confirming your checkout</h1>
        <p>Hang tight while we verify the payment and pull your enquiry details through.</p>
      </div>
    </div>
  </main>

  <script type="module" src="service-success.js"></script>
</body>
</html>
